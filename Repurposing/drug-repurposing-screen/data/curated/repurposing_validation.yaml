# Known successful drug-repurposing cases for backtesting the screen.
#
# Each case names a drug and one indication it was REPURPOSED for (distinct
# from its original use). The script computes mech_support for the
# (drug, repurposed_indication) pair from drug_targets x target_disease,
# without subtracting novelty -- the question is "would the mechanism layer
# surface this connection?" not "is it still flagged as novel today?".
#
# Field guide:
#   drug                    -- ChEMBL pref_name (case-sensitive)
#   chembl_id               -- optional explicit ChEMBL ID for disambiguation
#   original_indication     -- short description, not used by the script
#   repurposed_disease_name -- string match (case-insensitive substring) against
#                              target_disease.csv disease_name; fall back if
#                              repurposed_disease_efo is also unset
#   repurposed_disease_efo  -- OT canonical id (preferred -- exact match)
#   mechanism_targets       -- the targets we expect to mediate the new
#                              indication; not required but used to flag
#                              "the connection is there but via a different
#                              target than expected"
#   year_repurposed         -- when the new use entered clinical practice
#                              (FDA approval where applicable)

cases:
  - drug: SILDENAFIL
    original_indication: erectile dysfunction
    repurposed_disease_name: pulmonary arterial hypertension
    repurposed_disease_efo: EFO_0001361
    mechanism_targets: [PDE5A]
    year_repurposed: 2005
    notes: Pfizer's Viagra/Revatio -- PDE5 inhibition in pulmonary vasculature.

