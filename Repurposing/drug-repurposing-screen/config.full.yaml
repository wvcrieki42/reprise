# Full-scale configuration: all approved US/EU drugs vs all diseases.
# Produced after running scripts/download_data.sh + scripts/build_full_tables.py.
mode: full
engine: duckdb                 # stream the big Open Targets association table from disk

paths:
  drugs:            data/full/drugs.csv
  drug_targets:     data/full/drug_targets.csv
  drug_indications: data/full/drug_indications.csv
  target_disease:   data/full/target_disease.csv          # generated by scripts/build_full_tables.py
  disease_ontology: data/full/disease_ontology.csv
  target_direction: data/full/target_direction.csv        # from adapters.opentargets_target_direction
  phylo_evidence:   data/full/phylo_evidence.csv          # from adapters.opentargets_phylo_evidence (IMPC)
  target_expression: data/full/target_expression.csv      # from adapters.opentargets_target_expression
  disease_tissue:   data/full/disease_tissue.csv          # curated disease -> tissue map
  gene_info:        data/full/gene_info.csv               # from adapters.opentargets_gene_info
  chembl_substance_map: data/full/chembl_substance_map.csv # from adapters.chembl_substance_map
  disease_synonyms: data/full/disease_synonyms.csv        # from adapters.opentargets_disease_synonyms
  target_pathways:  data/full/target_pathways.csv         # from adapters.opentargets_target_pathways
  orange_book:      data/full/fda_orange_book.csv         # from adapters.fda_orange_book
  string_edges:     data/full/string_edges.csv            # from scripts/build_string_edges.py
  outdir:           output_full

universe:
  require_max_phase: 4
  regions: [us, eu]
  modalities: [small_molecule, antibody, protein, oligonucleotide, other]

network:
  enabled: true
  source: file                 # use local edge file; avoids live STRING API dependency
  min_confidence: 0.7
  max_partners: 10
  neighbor_weight: 0.5
  string_species: 9606
  cache_dir: .cache/string

propagation:
  min_assoc: 0.10
  aggregate: noisy_or
  top_targets_kept: 5

substance_grouping:
  # Collapse formulation variants (PIOGLITAZONE HYDROCHLORIDE -> PIOGLITAZONE,
  # INSULIN HUMAN ZINC -> INSULIN HUMAN) up to ChEMBL's active-ingredient
  # parent. Keeps the highest-opportunity row per (substance, disease) and
  # records the variant names + count. Runs BEFORE literature / market passes
  # so they query the substance, not each formulation.
  enabled: true
  collapse: true

novelty:
  ontology_radius: 1
  soft: true

combination:
  # For each top-N primary (drug, disease) hit, find 1-2 companion drugs
  # that bridge UNCOVERED disease targets and gain meaningful synergy under
  # noisy-OR. Rejects same-class redundancy via target_overlap filter.
  enabled: true
  top_n: 200                  # only enrich the top primary hits
  min_synergy: 0.1            # combo_mech - mech_primary threshold
  max_target_overlap: 0.5     # reject candidates that share >50% of primary's targets
  partners_per_hit: 2
  partner_min_assoc: 0.3      # only count strong disease targets when scoring

severity:
  # Damp 'receptor LoF + agonist' hypotheses: when disease_gene_match is
  # populated AND the disease name carries severity language (deficiency,
  # complete absence, Donohue, etc.) AND the drug is an AGONIST on the
  # named gene, the agonist can't activate a broken receptor -- knock
  # opportunity down. Doesn't touch partial-LoF rescuables where the
  # disease name doesn't include 'deficiency' (TZDs -> PPARG-related
  # familial partial lipodystrophy, calcimimetics -> familial
  # hypocalciuric hypercalcemia 1).
  enabled: true
  damp_factor: 0.7             # 1.0 = full knockdown; 0.0 = inspection only

direction:
  enabled: true
  aligned_factor: 1.0
  opposed_factor: 0.15
  unknown_factor: 0.6
  default_factor: 1.0
  align_threshold: 0.34

pathway:
  # Boost (drug, disease) pairs where the drug's direct targets share Reactome
  # pathways with the disease's strongly-associated targets. Captures the
  # indirect mechanism case: drug -> target A -> pathway P <- target B <- disease,
  # where A != B. Restricted to specific pathways (<= max_pathway_size genes)
  # so generic categories don't match everything. Boost-only (no penalty on
  # absence) -- weaker evidence than direct target overlap (default boost
  # smaller than phylogenetics).
  enabled: true
  boost_factor: 0.3            # max 1.3x boost when n_overlap >= saturation
  max_pathway_size: 80         # filter out generic / supercategory pathways
  min_assoc: 0.3               # only count strongly-associated disease targets
  saturation: 5                # n_overlap at which pathway_score saturates
  indirect_only: true          # only credit drug_target != disease_target bridges
                               # (direct hits already counted in mechanistic_support)

phylogenetics:
  # Boost-only filter: model-organism (orthologous-gene) evidence for the
  # target-disease pair. Sources are OT animal_model datasources (IMPC by
  # default -- mouse knockouts mapped to human diseases via PhenoDigm).
  # PRESENT evidence multiplies opportunity by (1 + boost_factor * score);
  # ABSENT evidence applies no penalty (factor 1.0). Rationale: model-
  # organism studies aren't run for every gene yet, so absence is not
  # evidence against the target.
  enabled: true                # on by default at full scale -- 630k evidence rows
  boost_factor: 0.5            # max boost: opp *= 1.5 when phylo_score = 1.0
  min_score: 0.0               # filter weak evidence rows before aggregation
  sources: [impc]              # extend with gene2phenotype etc. as needed

tissue:
  enabled: true
  min_expression: 0.25
  absent_factor: 0.3
  unknown_factor: 0.7

scoring:
  w_mech: 1.0
  w_novelty: 1.0
  w_investigation: 0.5         # damp well-investigated combos (opp *= 1 - 0.5 * prior)
  promiscuity_penalty: true
  min_opportunity: 0.05        # tighter cut for the very large full-scale output
  top_n: 200000

ip:
  # FDA Orange Book IP signals per active ingredient. Inspection-only
  # (no scoring change). Match is on the substance_name post-collapse with
  # salt-suffix normalisation (PIOGLITAZONE HYDROCHLORIDE -> PIOGLITAZONE).
  # Orange Book covers small molecules only -- biologics (BLA, in the
  # Purple Book) get NaN columns, which is the right behaviour for the
  # 'has it gone generic / how long until LOE' question.
  enabled: true

market:
  # US market-size enrichment for predicted diseases. Joins a curated CSV
  # (efo_id keyed) onto the top-N hypotheses and attaches us_patients,
  # us_prevalence_per_100k, and an is_orphan flag (< 200k US patients =
  # FDA Orphan Drug Act threshold). Inspection-only: never changes
  # opportunity or rank -- you sort/filter by these columns downstream.
  enabled: true                # 122-disease curated CSV + 5k rare-disease Orphanet fallback
  top_n: 10000
  curated_csv: data/curated/disease_prevalence.csv
  orphanet_csv: data/curated/orphanet_prevalence.csv  # built by scripts/build_orphanet_prevalence.py
  rare_disease_us_threshold: 200000

kol:
  # Key-opinion-leader finder: per top-N hypothesis, find ONE US + ONE EU
  # KOL by querying PubMed for the (target, disease) pair, aggregating
  # authors by publication count, and applying affiliation preference:
  #   US: Boston / Cambridge MA / Bay Area (SF, Stanford, Berkeley, PA)
  #   EU: Belgium > Netherlands > France / Germany / Luxembourg > UK > other
  # h-index pulled from Semantic Scholar's free Author API. Inspection-only
  # (never changes ranking). Default top_n is small so first runs are fast;
  # bump it when you want broader coverage. Uses NCBI_API_KEY env var
  # automatically (10 req/s instead of 3).
  enabled: false
  top_n: 100
  max_pmids_per_pair: 50         # how many recent papers to scan per pair
  max_workers: 4
  cache_dir: .cache/kol

literature:
  # Two-pass enrichment: query PubMed / Europe PMC / ClinicalTrials.gov for the
  # top-N hypotheses after the initial score, attach counts and a normalised
  # investigation_prior in [0, 1]. To actually re-rank by it, set
  # scoring.w_investigation > 0 above.
  enabled: true
  top_n: 5000                # full 4-source pass on the top-N hypotheses
  lens_top_n: 5000           # Lens-only extended pass past top_n (set higher than top_n
                             # to extend patent coverage without burning PubMed/NCT
                             # quota; dedup on (target, disease) keeps issued query
                             # count bounded by unique pairs)
  cache_dir: .cache/literature
  enable_pubmed: true
  enable_europepmc: true
  enable_clinicaltrials: true
  enable_lens: false           # patent search via api.lens.org (requires token)
  max_synonyms_target: 4       # OR full gene name + aliases into target side
  max_synonyms_disease: 4      # OR disease synonyms into disease side (when supplied)
  max_workers: 4
  # ncbi_api_key: "..."        # 3 -> 10 req/s on PubMed (free key: https://www.ncbi.nlm.nih.gov/account/)
  # lens_api_token: "..."      # https://www.lens.org/lens/user/subscriptions (free academic tier)
  # ^^ Both of these prefer env vars -- export NCBI_API_KEY=... and
  # LENS_API_TOKEN=... in your shell instead of putting them here.
  # Setting LENS_API_TOKEN auto-enables enable_lens unless you set it to false.

provenance:
  chembl_version: "34"
  opentargets_version: "24.06"
  string_version: "v12.0"
  efo_version: "2024-06"
